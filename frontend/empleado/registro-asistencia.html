<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia - RHM</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="container">
        <div class="attendance-card">
            <!-- Header -->
            <div class="card-header">
                <button class="btn-back" onclick="volver()">←</button>
                <div class="header-content">
                    <div class="header-icon">👷</div>
                    <h1>Registro de Asistencia</h1>
                </div>
            </div>

            <!-- Formulario de registro -->
            <form id="registroForm" class="attendance-form">
                <!-- Fecha -->
                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <div class="input-with-icon">
                        <input type="text" id="fecha" readonly>
                        <span class="input-icon">📅</span>
                    </div>
                </div>

                <!-- Hora -->
                <div class="form-group">
                    <label for="hora">Hora</label>
                    <div class="input-with-icon">
                        <input type="text" id="hora" readonly>
                        <span class="input-icon">🕐</span>
                    </div>
                </div>

                <!-- Código o nombre -->
                <div class="form-group">
                    <label for="codigo">Código o Nombre *</label>
                    <div class="input-with-icon">
                        <input type="text" id="codigo" placeholder="Buscar por nombre/código o escanear QR" required autocomplete="off" autofocus>
                        <button type="button" class="btn-qr" id="btnEscanearQR" onclick="activarEscanner()" title="Escanear código QR">
                            <span class="qr-icon">📷</span>
                        </button>
                    </div>
                    <div id="listaEmpleados" class="lista-empleados" style="display: none;"></div>
                    <div id="qr-reader" class="qr-reader-container" style="display: none;"></div>
                    <small class="help-text">Puedes buscar por texto o escanear el QR.</small>
                </div>

                <!-- Movimiento -->
                <div class="form-group">
                    <label>Movimiento *</label>
                    <div class="movimiento-buttons">
                        <button type="button" class="movimiento-btn" data-movimiento="ENTRADA" onclick="seleccionarMovimiento('ENTRADA')">
                            INGRESO
                        </button>
                        <button type="button" class="movimiento-btn" data-movimiento="SALIDA" onclick="seleccionarMovimiento('SALIDA')">
                            SALIDA
                        </button>
                    </div>
                    <input type="hidden" id="movimiento" required>
                </div>

                <!-- Turno -->
                <div class="form-group">
                    <label>Turno *</label>
                    <div class="turno-buttons turno-buttons-grid">
                        <button type="button" class="turno-btn" data-turno="1" onclick="seleccionarTurno(1)">
                            Turno 1<br><small>11pm - 7am</small>
                        </button>
                        <button type="button" class="turno-btn" data-turno="2" onclick="seleccionarTurno(2)">
                            Turno 2<br><small>7am - 3pm</small>
                        </button>
                        <button type="button" class="turno-btn" data-turno="3" onclick="seleccionarTurno(3)">
                            Turno 3<br><small>3pm - 11pm</small>
                        </button>
                        <button type="button" class="turno-btn" data-turno="4" onclick="seleccionarTurno(4)" title="Jornada 7:00–16:30; salida 16:30–18:00 suma 1.5 h extra en nómina">
                            Turno Planta<br><small>7am - 4:30pm</small>
                        </button>
                    </div>
                    <small class="help-text">Turno Planta: si la salida está entre 4:30 y 6:00 p. m., en el cálculo de sueldo se agregan 1.5 h extra.</small>
                    <input type="hidden" id="turno" required>
                </div>

                <!-- Botones de acción -->
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>

            <!-- Mensaje de éxito/error -->
            <div id="mensaje" class="mensaje" style="display: none;"></div>
        </div>
    </div>

    <!-- Configuración de API -->
    <script src="../js/theme.js"></script>
    <script src="../js/config.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="../js/registro-asistencia.js"></script>
</body>
</html>
